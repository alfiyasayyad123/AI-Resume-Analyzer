<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Resume Analyzer</title>
    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">AI Resume Analyzer</a>

        <div class="ms-auto">
            <button class="btn btn-light">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Welcome, User 👋</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h4>📄 Upload Resume</h4>
                <p>Upload your latest resume for AI analysis.</p>
                <a href="upload.html" class="btn btn-primary">Upload</a>
                <br><br>
                <a href="dashboard.html" class="btn btn-secondary">
                    back to dashboard
                    </a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h4>📊 Resume Score</h4>
                <h1>--</h1>
                <p>Score will appear after analysis.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h4>🤖 AI Suggestions</h4>
                <p>Your AI recommendations will appear here.</p>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
